{% extends "base.html" %}

{% block page_title %}Sign in — Meatyboys Rugby Fantasy{% endblock %}

{% block extra_styles %}<link rel="stylesheet" href="/static/css/auth.css">{% endblock %}

{% block content %}
<div class="auth-wrap">
<div class="auth-card">
  <div class="auth-hero">
    <h1>Meatyboys<span class="accent">.</span></h1>
    <p>Rugby Fantasy</p>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="login">Sign in</button>
    <button class="tab" data-tab="register">Create account</button>
  </div>

  <div id="login" class="tab-content active">
    <div id="login-alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="login-remember" checked>
        <label for="login-remember">Remember me on this device</label>
      </div>
      <button type="submit" id="login-btn">Sign in</button>
    </form>
  </div>

  <div id="register" class="tab-content">
    <div id="register-alert"></div>
    <form id="register-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="register-email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="register-password" placeholder="At least 6 characters" minlength="6" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="register-password-confirm" placeholder="Confirm password" autocomplete="new-password" required>
      </div>

      <div class="league-step-label">Join a fantasy league</div>
      <div class="league-cards" id="league-cards"></div>

      <div id="register-team-step">
        <div class="form-group">
          <label>Name your team</label>
          <input type="text" id="register-team" placeholder="e.g. The Try Hards" maxlength="40">
        </div>
        <button type="submit" id="register-btn">Create account</button>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth.js"></script>
{% endblock %}
